name: BuildMaster APK Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Kodlari Cek
      uses: actions/checkout@v4

    - name: Java 17 Kur
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Kararli Python 3.10 Kur
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Buildozer ve Kivy Yukle
      run: |
        pip install --upgrade pip
        pip install buildozer kivy Cython==0.29.36

    - name: buildozer.spec Dosyasini Otomatik Olustur
      run: |
        buildozer init
        sed -i 's/requirements = python3,kivy/requirements = python3,kivy,chess/g' buildozer.spec
        sed -i 's/android.api = 31/android.api = 33/g' buildozer.spec

    - name: APK Derleme Islemini Baslat
      run: |
        mkdir -p ~/.android && touch ~/.android/repositories.cfg
        yes | buildozer -v android debug

    - name: APK Dosyasini Cikar ve Kullaniciya Sun
      uses: actions/upload-artifact@v4
      with:
        name: GrandMaster-Chess-APK
        # Bu sihirli yıldızlar sayesinde nerede olursa olsun üretilen tüm APK'ları yakalayacak:
        path: .buildozer/**/*.apk
